# Smriti host config.

[ai]
# Any OpenAI-compatible endpoint. This is also the Hermes seam: when the
# Hermes agent (Pi) exposes /v1/chat/completions, point base_url at it and
# Monke routes through Hermes — no code change.
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
model = "gemini-3.1-flash-lite"
api_key_env = "GEMINI_API_KEY"
temperature = 0.7
max_tokens = 1024

# LM Studio local:
#   base_url = "http://localhost:1234/v1"
#   model = "qwen3-vl-4b-instruct"
# Hermes on the Pi (future):
#   base_url = "http://monke.local:8000/v1"
#   model = "hermes"
# Groq (free tier, very fast):
#   base_url = "https://api.groq.com/openai/v1"
#   model = "meta-llama/llama-4-scout-17b-16e-instruct"
#   api_key_env = "GROQ_API_KEY"
# OpenRouter free VL models (rate-limited):
#   base_url = "https://openrouter.ai/api/v1"
#   model = "qwen/qwen2.5-vl-7b-instruct:free"
#   api_key_env = "OPENROUTER_API_KEY"

[capture]
host = "rm2"                # ssh alias for the tablet (see README)
idle_seconds = 2.8

[monke]
reply_style = "cursive"     # any style from styles.toml
waypoint_step = 3           # lower = smoother, slower
page_bottom = 1780          # reply overflowing this -> page-turn swipe
fade = false                # riddle mode: your ink fades, reply appears in its
                            # place, lingers, fades too. ERASES handwriting —
                            # keep false for journaling you want to keep.
fade_hold = 8               # seconds the reply stays readable before fading
history_turns = 6           # conversation memory (page images + replies kept)
